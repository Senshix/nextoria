<section id="about" class="section about-section">
  <div class="about-card glass-card">
    <div class="about-header">
      <h2 class="gradient-text about-title">{{ tr.t.about.title }}</h2>
      <span class="about-logo-icon"></span>
    </div>
    <p class="about-desc">{{ tr.t.about.desc }}</p>
    <div class="about-tags">
      <span class="tag"><span class="tag-dot cyan"></span>{{ tr.t.about.tag1 }}</span>
      <span class="tag"><span class="tag-dot purple"></span>{{ tr.t.about.tag2 }}</span>
      <span class="tag"><span class="tag-dot indigo"></span>{{ tr.t.about.tag3 }}</span>
    </div>
  </div>
</section>
