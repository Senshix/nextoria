<section id="home" class="hero-section">
  <div class="glow-blob blob-1"></div>
  <div class="glow-blob blob-2"></div>

  <div class="hero-content fade-up">
    <div class="ai-badge">
      <span class="badge-dot"></span>
      {{ tr.t.hero.badge }}
    </div>

    <h1 class="hero-title gradient-text">{{ tr.t.hero.title }}</h1>
    <h2 class="hero-subtitle">{{ tr.t.hero.subtitle }}</h2>
    <p class="hero-description">{{ tr.t.hero.description }}</p>

    <button class="btn-gradient cta-btn">{{ tr.t.hero.cta }}</button>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-number gradient-text">{{ tr.t.hero.stat1.value }}</span>
        <span class="stat-label">{{ tr.t.hero.stat1.label }}</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number gradient-text">{{ tr.t.hero.stat2.value }}</span>
        <span class="stat-label">{{ tr.t.hero.stat2.label }}</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number gradient-text">{{ tr.t.hero.stat3.value }}</span>
        <span class="stat-label">{{ tr.t.hero.stat3.label }}</span>
      </div>
    </div>
  </div>
</section>
